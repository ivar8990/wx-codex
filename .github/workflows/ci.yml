name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: CLI smoke test
        run: npm run smoke

      - name: Package dry run
        run: npm run pack:dry-run

      - name: Scan for local-only artifacts
        if: runner.os != 'Windows'
        run: |
          ! find . -name 'project.private.config.json' -print | grep .
          ! find . -name 'preview-qrcode*' -print | grep .
          ! grep -R -nE 'wx[a-f0-9]{16}' \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            .

      - name: Scan for local-only artifacts on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $privateConfigs = Get-ChildItem -Recurse -Filter "project.private.config.json"
          if ($privateConfigs) {
            $privateConfigs.FullName
            exit 1
          }

          $qrCodes = Get-ChildItem -Recurse -Filter "preview-qrcode*"
          if ($qrCodes) {
            $qrCodes.FullName
            exit 1
          }

          $matches = Select-String -Path (Get-ChildItem -Recurse -File | Where-Object {
            $_.FullName -notmatch "\\node_modules\\" -and $_.FullName -notmatch "\\dist\\"
          }).FullName -Pattern "wx[a-f0-9]{16}" -ErrorAction SilentlyContinue
          if ($matches) {
            $matches
            exit 1
          }
